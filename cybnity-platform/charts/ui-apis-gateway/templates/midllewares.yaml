# Middleware allowinh Headers (e.g management for Keycloak routing)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Values.middlewares.secureHeaders.name }}
  namespace: {{ .Values.middlewares.secureHeaders.namespace }}
spec:
  headers:
    frameDeny: true
    sslRedirect: true
    browserXssFilter: true
    contentTypeNosniff: true
    stsIncludeSubdomains: true
    stsPreload: true
    stsSeconds: 31536000
---
# Middleware allowing IP listing for access control
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Values.middlewares.ipAllowlist.name }}
  namespace: {{ .Values.middlewares.ipAllowlist.namespace }}
spec:
  ipAllowList:
    {{- if .Values.middlewares.ipAllowlist.sourceRange }}
    sourceRange:
      {{- range .Values.middlewares.ipAllowlist.sourceRange }}
      - {{ . }}
      {{- end }}
    {{- end }}
