# Route configuration managed by a gateway to a service
# See Gateway API - HTTP Routing documentation at https://gateway-api.sigs.k8s.io/guides/http-routing/
{{- if .Values.httproutes }}
{{- range .Values.httproutes }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .serviceName }}
  namespace: {{ .namespace }}
  labels:
    name: {{ .serviceName }}
    app.kubernetes.io/component: infrastructure
    app.kubernetes.io/part-of: ui-apis-gateway
spec:
  {{- if .parentRefs }}
  parentRefs:
    {{- range .parentRefs }}
    - name: {{ .name }}
      {{- if .sectionName }}
      sectionName: {{ .sectionName }}
      {{- end }}
      {{- if .kind }}
      kind: {{ .kind }}
      {{- end }}
    {{- end }}
  {{- end }}
  {{- if .hostnames }}
  hostnames:
    {{- range .hostnames }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  rules:
  {{- if .matches }}
    {{- range .matches }}
    - matches:
      {{- range .paths }}
      - path:
          type: {{ .type }}
          value: {{ .value }}
      {{- end }}
      {{- if .filters }}
      filters:
        {{- range .filters }}
          - type: {{ .type }}
            extensionRef:
            {{- with .extensionRef }}
              group: {{ .group }}
              kind: {{ .kind }}
              name: {{ .name }}
            {{- end }}
        {{- end }}
      {{- end }}
      {{- if .backendRefs }}
      backendRefs:
        {{- range .backendRefs }}
        - name: {{ .name }}
          port: {{ .port }}
          {{- if .namespace }}
          namespace: {{ .namespace }}
          {{- end }}
        {{- end }}
      {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
{{- end }}
