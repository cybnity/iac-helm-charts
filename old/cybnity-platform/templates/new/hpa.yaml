{{- if .Values.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "cybnity-platform.fullname" . }}
  labels:
    {{- include "cybnity-platform.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "cybnity-platform.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.autoscaling.targetAverageCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetAverageCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.autoscaling.targetAverageMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetAverageMemoryUtilizationPercentage }}
    {{- end }}
status:
  observedGeneration: 1
  lastScaleTime: <some-time>
  currentReplicas: {{ .Values.autoscaling.minReplicas }}
  desiredReplicas: {{ .Values.autoscaling.desiredReplicas }}
  currentMetrics:
  - type: Resource
    resource:
      name: cpu
      current:
        averageUtilization: 0
        averageValue: 0
{{- end }}
