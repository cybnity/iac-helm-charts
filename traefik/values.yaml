# Traefik helm values.yaml file documented at https://github.com/traefik/traefik-helm-chart/blob/master/traefik/values.yaml
# Examples of configuration in documentation at https://doc.traefik.io/traefik/reference/install-configuration/entrypoints#configuration-example

# -- This field overrides the default Release Namespace for Helm.
# It will not affect optional CRDs such as `ServiceMonitor` and `PrometheusRules`
#namespaceOverride: "traefik"

# -- Add additional label to all resources
commonLabels:
  ## @param module labels for the deployed component
  ##   app.kubernetes.io/component (architecture level): <<name of implemented via>> (see https://www.notion.so/cybnity/5a681e57f2164d4f8a3f228129294db9?v=348e6a0d04e449f883616c948abec85d) as ui, application, domain, infrastructure, security-control
  ##   app.kubernetes.io/part-of (application level): <<name of deploybale system>> (see https://cybnity.notion.site/5a681e57f2164d4f8a3f228129294db9?v=02fde7cb6f8e4d69b8497d6ca97e4316); for e.g. Asset Control Domain Gateway
  ##
  app.kubernetes.io/component: infrastructure
  app.kubernetes.io/part-of: apis-gateway
  proxy.area: dmz # Scope of configuration relative to first DMZ external barrier

# Traefik Helm project chart doc at https://github.com/traefik/traefik-helm-chart
image:
  # -- Traefik image host registry
  registry: docker.io
  # -- Traefik image repository
  # Official Traefik Docker image from https://hub.docker.com/_/traefik
  repository: traefik
  # -- defaults to appVersion. It's used for version checking, even prefixed with experimental- or latest-.
  # When a digest is required, `versionOverride` can be used to set the version.
  tag: ""
  # -- Traefik image pull policy
  pullPolicy: IfNotPresent

deployment:
  enabled: true
  # -- Deployment or DaemonSet
  kind: Deployment
  # -- Number of pods of the deployment (only applies when kind == Deployment)
  replicas: 1
  ## -- Override the liveness/readiness port. This is useful to integrate traefik
  ## with an external Load Balancer that performs healthchecks.
  ## Default: ports.traefik.port
  #healthchecksPort:  # @schema type:[integer, null];minimum:0
  ## -- Override the liveness/readiness host. Useful for getting ping to respond on non-default entryPoint.
  ## Default: ports.traefik.hostIP if set, otherwise Pod IP
  #healthchecksHost: ""
  ## -- Override the liveness/readiness scheme. Useful for getting ping to
  ## respond on websecure entryPoint.
  #healthchecksScheme:   # @schema enum:[HTTP, HTTPS, null]; type:[string, null]; default: HTTP
  ## -- Override the readiness path.
  ## Default: /ping
  #readinessPath: ""
  # -- Override the liveness path.
  # Default: /ping
  #livenessPath: ""
  # -- Custom [host aliases](https://kubernetes.io/docs/tasks/network/customize-hosts-file-for-pods/)
  # - ip: "127.0.0.1" # this is an example
  #   hostnames:
  #   - "foo.local"
  #   - "bar.local"

# @schema mergeProperties: true
ports:
  # @schema additionalProperties: false
  traefik:
    port: 8080
    # Defines whether the port is exposed if service.type is LoadBalancer or
    # NodePort.
    #
    # -- SHOULD NOT be exposed traefik port on production deployments.
    # If you want to access it from outside your cluster,
    # use `kubectl port-forward` or create a secure ingress
    expose:
      default: false
    # -- The exposed port for this service
    exposedPort: 8080

  # EntryPoints listening for incoming connections/requests
  web:
    port: 8000
    #nodePort: 30000
    #hostPort: 8000
    #containerPort: 8000
    expose:
      default: true
    # Maps port 80 to the web exposure entrypoint
    exposedPort: 80
    http:
      redirections:
        # -- Port Redirections
        # Added in 2.2, one can make permanent redirects via entrypoints.
        # Same sets of parameters: to, scheme, permanent and priority.
        # https://doc.traefik.io/traefik/reference/install-configuration/entrypoints/#configuration-example
        entryPoint: {}
    forwardedHeaders:
      # -- Trust forwarded headers information (X-Forwarded-*).
      trustedIPs: []
      insecure: false
  websecure:
    ## -- Enable this entrypoint as a default entrypoint. When a service doesn't explicitly set an entrypoint it will only use this entrypoint.
    # asDefault: true
    port: 8443
    #hostPort:  # @schema type:[integer, null]; minimum:0
    #containerPort:  # @schema type:[integer, null]; minimum:0
    expose:
      default: true
    # Maps port 80 to the websecure exposure entrypoint
    exposedPort: 443
    #http:
      # -- See [upstream documentation](https://doc.traefik.io/traefik/security/request-path/#encoded-character-filtering)
    #http3:
      ## -- Enable HTTP/3 on the entrypoint
      ## Enabling it will also enable http3 experimental feature
      ## https://doc.traefik.io/traefik/routing/entrypoints/#http3
      ## There are known limitations when trying to listen on same ports for
      ## TCP & UDP (Http3). There is a workaround in this chart using dual Service.
      ## https://github.com/kubernetes/kubernetes/issues/47249#issuecomment-587960741
      #enabled: false
    #forwardedHeaders:
        # -- Trust forwarded headers information (X-Forwarded-*).
      #trustedIPs: []
      #insecure: false
  metrics:
    # -- When using hostNetwork, use another port to avoid conflict with node exporter:
    # https://github.com/prometheus/prometheus/wiki/Default-port-allocations
    port: 9100
    # -- You may not want to expose the metrics port on production deployments.
    # If you want to access it from outside your cluster,
    # use `kubectl port-forward` or create a secure ingress
    expose:
      default: false
    # -- The exposed port for this service
    exposedPort: 9100

# Traefik service
service:
  enabled: true
  ## -- Single service is using `MixedProtocolLBService` feature gate.
  ## -- When set to false, it will create two Service, one for TCP and one for UDP.
  single: true
  type: LoadBalancer
  # -- Additional service labels (e.g. for filtering Service by custom labels)
  labels: {}
  # -- Additional entries here will be added to the service spec.
  # -- Cannot contain type, selector or ports entries.
  spec: {}
  # externalTrafficPolicy: Cluster
  # loadBalancerIP: "1.2.3.4"
  # clusterIP: "2.3.4.5"
  loadBalancerSourceRanges: []
  # - 192.168.0.1/32
  # - 172.16.0.0/16
  ## -- Class of the load balancer implementation
  # loadBalancerClass: service.k8s.aws/nlb
  externalIPs: []
  # - 1.2.3.4
  ## One of SingleStack, PreferDualStack, or RequireDualStack.
  # ipFamilyPolicy: SingleStack
  ## List of IP families (e.g. IPv4 and/or IPv6).
  ## ref: https://kubernetes.io/docs/concepts/services-networking/dual-stack/#services
  # ipFamilies:
  #   - IPv4
  #   - IPv6
  ##
  additionalServices: {}
  ## -- An additional and optional internal Service.
  ## Same parameters as external Service
  # internal:
  #   type: ClusterIP
  #   # labels: {}
  #   # annotations: {}
  #   # spec: {}
  #   # loadBalancerSourceRanges: []
  #   # externalIPs: []
  #   # ipFamilies: [ "IPv4","IPv6" ]

autoscaling:  # @schema additionalProperties: false
  # -- Create HorizontalPodAutoscaler object.
  # See EXAMPLES.md for more details.
  enabled: false

persistence:
  # -- Enable persistence using Persistent Volume Claims
  # ref: http://kubernetes.io/docs/user-guide/persistent-volumes/.
  # It can be used to store TLS certificates along with `certificatesResolvers.<name>.acme.storage`  option
  enabled: false

# -- Certificates resolvers configuration.
# Ref: https://doc.traefik.io/traefik/https/acme/#certificate-resolvers
# See EXAMPLES.md for more details.
certificatesResolvers: {}

# ASSIGNMENT TO THE NODE ('layer' label value relative to a cluster area)
## Node labels for pod assignment
# cybnity.io/domains-io-area: "true"
# cybnity.io/domains-area: "true"
# cybnity.io/user-interfaces-area: "true"
# cybnity.io/infrastructure-services-area: "true"
#nodeSelector:
  #cybnity.io/user-interfaces-area: "true"

ingressRoute:
  dashboard:
    # By default, don't expose the local Traefik dashboard
    # See https://doc.traefik.io/traefik/reference/install-configuration/api-dashboard/ documentation for security of dashboard api
    enabled: true
    # -- The router match rule used for the dashboard ingressRoute
    matchRule: PathPrefix(`/dashboard`) || PathPrefix(`/api`)

    # -- The internal service used for the dashboard ingressRoute
    # @default -- api@internal
    #services:
    #  - name: api@internal
    #    kind: TraefikService
    # -- Specify the allowed entrypoints to use for the dashboard ingress route, (e.g. traefik, web, websecure).
    # By default, it's using traefik entrypoint, which is not exposed.
    # /!\ Do not expose your dashboard without any protection over the internet /!\
    entryPoints:
      - web # Allowed dashboard access from external over http url http://localhost:8080/dashboard/ or http://<<cluster ip address>>/dashboard/

  #healthcheck:
    # -- Create an IngressRoute for the healthcheck probe
    #enabled: true
    # -- The router match rule used for the healthcheck ingressRoute
    #matchRule: PathPrefix(`/ping`)
    # -- Specify the allowed entrypoints to use for the healthcheck ingress route, (e.g. traefik, web, websecure).
    # By default, it's using traefik entrypoint, which is not exposed.
    #entryPoints: ["traefik"]

## Gateway Listeners relative to the default global K8S cluster gateway API regarding any CYBNITY layer
gateway:
  # -- When providers.kubernetesGateway.enabled, deploy a default gateway
  enabled: true
  # Custom name to gateway
  name: "traefik-apis-gateway"
  # -- By default, Gateway is created in the same `Namespace` as Traefik.
  #namespace: "traefik"
  # -- [Infrastructure](https://kubernetes.io/blog/2023/11/28/gateway-api-ga/#gateway-infrastructure-labels)
  #infrastructure: {}
  # For cluster operator, this Gateway is designated as default. Doc at https://kubernetes.io/blog/2025/11/06/gateway-api-v1-4/#for-cluster-operators-you-re-still-in-control

  listeners:
    web:
      # -- Port is the network port. Multiple listeners may use the same port, subject to the Listener compatibility rules.
      # The port must match a port declared in ports section.
      port: 8000
      # -- Optional hostname. See [Hostname](https://gateway-api.sigs.k8s.io/reference/spec/#gateway.networking.k8s.io/v1.Hostname)
      #hostname: ""
      # Specify expected protocol on this listener. See [ProtocolType](https://gateway-api.sigs.k8s.io/reference/spec/#gateway.networking.k8s.io/v1.ProtocolType)
      #protocol: HTTP
      # -- (object) Routes are restricted to namespace of the gateway [by default](https://gateway-api.sigs.k8s.io/reference/spec/#gateway.networking.k8s.io/v1.FromNamespaces
      namespacePolicy:  # @schema type:[object, null]
        # Allows the Gateway to expose HTTPRoutes from all namespaces
        from: All
      # -- Optional hostname. See [Hostname](https://gateway-api.sigs.k8s.io/reference/spec/#gateway.networking.k8s.io/v1.Hostname)
      hostname: ""

      # websecure listener is disabled by default because certificateRefs needs to be added,
      # or you may specify TLS protocol with Passthrough mode and add "--providers.kubernetesGateway.experimentalChannel=true" in additionalArguments section.
    #websecure:
      #-- Port is the network port. Multiple listeners may use the same port, subject to the Listener compatibility rules.
      # The port must match a port declared in ports section.
      #port: 8443
      #-- Optional hostname. See [Hostname](https://gateway-api.sigs.k8s.io/reference/spec/#gateway.networking.k8s.io/v1.Hostname)
      #   hostname:
      # Specify expected protocol on this listener See [ProtocolType](https://gateway-api.sigs.k8s.io/reference/spec/#gateway.networking.k8s.io/v1.ProtocolType)
      #protocol: HTTPS # TLS terminates inside Traefik
      #-- Routes are restricted to namespace of the gateway [by default](https://gateway-api.sigs.k8s.io/reference/spec/#gateway.networking.k8s.io/v1.FromNamespaces)
      #namespacePolicy:
      #-- Add certificates for TLS or HTTPS protocols. See [GatewayTLSConfig](https://gateway-api.sigs.k8s.io/reference/spec/#gateway.networking.k8s.io%2fv1.GatewayTLSConfig)
      #  certificateRefs:
      #-- TLS behavior for the TLS session initiated by the client. See [TLSModeType](https://gateway-api.sigs.k8s.io/reference/spec/#gateway.networking.k8s.io/v1.TLSModeType).
      #    mode: Terminate

# Default global gateway (Load Balancer)
gatewayClass:
  # -- When providers.kubernetesGateway.enabled and gateway.enabled, deploy a default gatewayClass
  enabled: true
  # -- Set a custom name to GatewayClass
  name: "traefik-apis-gw"
  labels:
    app.kubernetes.io/component: infrastructure
    app.kubernetes.io/part-of: ui-apis-gateway
    osi.proxy.layer: application-level-proxy # application (layer 7 as proxy mode for directive to HTTP), session (layer 5 as proxy mode for session mechanisms establishing point-to-point communication)
    proxy.area: dmz # Scope of configuration relative to first DMZ external barrier

# Enable Gateway API Provider & Disables the KubernetesIngress provider
# Providers tell Traefik where to find routing configuration.
providers:
  kubernetesCRD:
    # Provider of K8S Custom Resources such as IngressRoute, Middleware...
    # See configuration options at https://doc.traefik.io/traefik/reference/install-configuration/providers/kubernetes/kubernetes-crd/
    # Exposure based on Kubernetes CRD (e.g. IngressRoute resource) per application service
    enabled: true
  kubernetesIngress:
    # K8S Ingress controller that manage access to cluster services by supporting the Ingress specification
    # See doc at https://doc.traefik.io/traefik/reference/install-configuration/providers/kubernetes/kubernetes-ingress/#traefik-kubernetes
    # Recommende to use Kubernetes Gateway API more sustainable than Ingress API controller
    enabled: false
    # -- Array of namespaces to watch. If left empty, Traefik watches all namespaces. . When using `rbac.namespaced`, it will watch helm release namespace and namespaces listed in this array.
    #namespaces: []
  kubernetesGateway:
    # Enable the Kubernetes Gateway API specification support for automated configuration of Ingress in Kubernetes
    # Automatic created default GatewayClass named traefik (see Gateway API doc at https://gateway-api.sigs.k8s.io/)
    enabled: true
    # -- Array of namespaces to watch. If left empty, Traefik watches all namespaces. . When using `rbac.namespaced`, it will watch helm release namespace and namespaces listed in this array.
    namespaces: []
    statusAddress:
      # -- This IP will get copied to the Gateway status.addresses, and currently only supports one IP value (IPv4 or IPv6).
      ip: ""
      # -- This Hostname will get copied to the Gateway status.addresses.
      hostname: ""
      service:
        # -- The Kubernetes service to copy status addresses from. When using third parties tools like External-DNS, this option can be used to copy the service loadbalancer.status (containing the service's endpoints IPs) to the gateways. Default to Service of this Chart.
        enabled: true
        name: ""
        namespace: ""

logs:
  general:
    # By default, the level is set to INFO.
    # -- Alternative logging levels are TRACE, DEBUG, INFO, WARN, ERROR, FATAL, and PANIC.
    level: INFO
